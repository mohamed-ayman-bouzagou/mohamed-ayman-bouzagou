    <circle cx="76" cy="42" r="12" fill="#0b0f1a" stroke="#092E20" stroke-width="1.5"/>
    <text x="76" y="47" text-anchor="middle" style="font:600 8px monospace;fill:#44B78B;">DJG</text>
    <text x="96" y="58" text-anchor="middle" class="c-label" style="font-size:9px">Django</text>
    <line x1="0" y1="18" x2="0" y2="65" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
    <circle cx="0" cy="78" r="12" fill="#0b0f1a" stroke="#41CD52" stroke-width="1.5"/>
    <text x="0" y="83" text-anchor="middle" style="font:600 8px monospace;fill:#41CD52;">Qt</text>
    <text x="0" y="98" text-anchor="middle" class="c-label" style="font-size:9px">Qt/C++</text>
    <line x1="-18" y1="5" x2="-65" y2="35" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
    <circle cx="-76" cy="42" r="12" fill="#0b0f1a" stroke="#00979D" stroke-width="1.5"/>
    <text x="-76" y="47" text-anchor="middle" style="font:600 8px monospace;fill:#00979D;">ARD</text>
    <text x="-96" y="58" text-anchor="middle" class="c-label" style="font-size:9px">Arduino</text>
    <line x1="-18" y1="-5" x2="-65" y2="-35" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
    <circle cx="-76" cy="-42" r="12" fill="#0b0f1a" stroke="#ec4899" stroke-width="1.5"/>
    <text x="-76" y="-37" text-anchor="middle" style="font:600 8px monospace;fill:#ec4899;">AI</text>

    <text class="c-val" y="174" style="font-size:10px">C++ OOP · SOFTWARE ENG</text>
    <text class="c-label" y="210">CONTACT</text>
    <text class="c-pink" y="228" style="font-size:10px">mohamedaymanbouzagou</text>

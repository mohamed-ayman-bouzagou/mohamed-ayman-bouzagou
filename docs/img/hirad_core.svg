  <text x="600" y="105" text-anchor="middle" class="c-title" fill="url(#titleGrad)" filter="url(#glowPurple)">DEVELOPER CORE</text>
  <line x1="360" y1="118" x2="840" y2="118" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3"/>
  <g transform="translate(600,210)">

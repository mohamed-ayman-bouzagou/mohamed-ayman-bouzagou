    <text class="c-val" y="158">TANGER, MAROC</text>
    <text class="c-label" y="194">SCHOOL</text>
    <text class="c-val" y="212">EMSI - IIR Y3</text>
    <text class="c-label" y="248">STATUS</text>
    <g transform="translate(0,258)">

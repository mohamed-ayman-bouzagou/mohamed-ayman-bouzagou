    <line x1="0" y1="-18" x2="0" y2="-65" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
    <circle cx="0" cy="-78" r="12" fill="#0b0f1a" stroke="#61DAFB" stroke-width="1.5"/>
    <text x="0" y="-73" text-anchor="middle" style="font:600 8px monospace;fill:#61DAFB;">RCT</text>
    <text x="0" y="-55" text-anchor="middle" class="c-label" style="font-size:9px">React</text>
    <line x1="18" y1="-5" x2="65" y2="-35" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
    <circle cx="76" cy="-42" r="12" fill="#0b0f1a" stroke="#FF2D20" stroke-width="1.5"/>
    <text x="76" y="-37" text-anchor="middle" style="font:600 8px monospace;fill:#FF2D20;">LRV</text>
    <text x="96" y="-25" text-anchor="middle" class="c-label" style="font-size:9px">Laravel</text>

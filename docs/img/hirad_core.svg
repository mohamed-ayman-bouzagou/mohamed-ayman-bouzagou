  <rect x="890" y="38" width="280" height="354" rx="4" fill="#0b0f1a" stroke="#1e293b" stroke-width="1"/>
  <text x="1030" y="68" text-anchor="middle" class="c-label">SYSTEM STATS</text>
  <line x1="910" y1="78" x2="1150" y2="78" stroke="#8b5cf6" stroke-width="0.5" opacity="0.4"/>
  <g transform="translate(910,100)">

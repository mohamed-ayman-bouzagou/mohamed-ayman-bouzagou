<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 430" width="100%" height="430">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0625"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="panelStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="48%" stop-color="#8b5cf6"/>
      <stop offset="72%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="lineFlow" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0"/>
      <stop offset="22%" stop-color="#8b5cf6" stop-opacity="0.85"/>
      <stop offset="52%" stop-color="#a78bfa" stop-opacity="0.9"/>
      <stop offset="82%" stop-color="#8b5cf6" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-120 0;120 0;-120 0" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.24"/>
      <stop offset="52%" stop-color="#4c1d95" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#8b5cf6" stroke-opacity="0.04" stroke-width="1">
        <animateTransform attributeName="transform" type="translate" values="0 0;34 34;0 0" dur="26s" repeatCount="indefinite"/>
      </path>
    </pattern>
    <filter id="glowPurple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b">
        <animate attributeName="stdDeviation" values="3.5;5;3.5" dur="4s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .c-title { font: 700 26px monospace; letter-spacing: 4px; }
      .c-sub   { font: 400 12px monospace; fill: #64748b; letter-spacing: 2px; }
      .c-label { font: 400 10px monospace; fill: #475569; letter-spacing: 1.5px; }
      .c-val   { font: 600 12px monospace; fill: #a78bfa; }
      .c-cyan  { font: 600 12px monospace; fill: #22d3ee; }
      .c-pink  { font: 600 12px monospace; fill: #ec4899; }
    </style>
  </defs>
  <rect width="1200" height="430" fill="url(#bg)"/>
  <rect width="1200" height="430" fill="url(#grid)"/>
  <ellipse cx="600" cy="215" rx="300" ry="200" fill="url(#coreGlow)"/>
  <rect x="14" y="14" width="1172" height="402" rx="6" fill="none" stroke="url(#panelStroke)" stroke-width="1.5"/>
  <g stroke="#8b5cf6" stroke-width="1.5" fill="none" opacity="0.7">
    <path d="M14,44 L14,14 L44,14"/>
    <path d="M1156,14 L1186,14 L1186,44"/>
    <path d="M14,386 L14,416 L44,416"/>
    <path d="M1186,386 L1186,416 L1156,416"/>
  </g>
  <line x1="0" y1="215" x2="1200" y2="215" stroke="url(#lineFlow)" stroke-width="1" opacity="0.4"/>
  <rect x="30" y="38" width="280" height="354" rx="4" fill="#0b0f1a" stroke="#1e293b" stroke-width="1"/>
  <text x="170" y="68" text-anchor="middle" class="c-label">IDENTITY CORE</text>
  <line x1="50" y1="78" x2="290" y2="78" stroke="#8b5cf6" stroke-width="0.5" opacity="0.4"/>
  <g transform="translate(50,100)">
    <text class="c-label" y="0">NAME</text>
    <text class="c-val" y="18">MOHAMED AYMAN</text>
    <text class="c-val" y="34">BOUZAGOU</text>
